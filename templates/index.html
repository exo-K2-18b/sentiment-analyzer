<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analyzer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 600px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: rgba(255,255,255,0.5);
            text-align: center;
            font-size: 14px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            height: 150px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border 0.3s;
        }

        textarea::placeholder { color: rgba(255,255,255,0.3); }
        textarea:focus { border-color: rgba(99, 179, 237, 0.6); }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            display: none;
        }

        .result.positive {
            background: rgba(72, 187, 120, 0.15);
            border: 1px solid rgba(72, 187, 120, 0.3);
        }

        .result.negative {
            background: rgba(245, 101, 101, 0.15);
            border: 1px solid rgba(245, 101, 101, 0.3);
        }

        .emoji { font-size: 40px; margin-bottom: 8px; }

        .sentiment {
            font-size: 24px;
            font-weight: 700;
            color: white;
            margin-bottom: 4px;
        }

        .confidence {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .loading {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Sentiment Analyzer</h1>
        <p class="subtitle">Enter a movie review and let AI decide if it's positive or negative</p>

        <textarea id="review" placeholder="Type your movie review here..."></textarea>
        <button onclick="analyze()" id="btn">Analyze Sentiment</button>

        <div class="loading" id="loading">⏳ Analyzing...</div>

        <div class="result" id="result">
            <div class="emoji" id="emoji"></div>
            <div class="sentiment" id="sentiment"></div>
            <div class="confidence" id="confidence"></div>
        </div>
    </div>

    <script>
        async function analyze() {
            const review = document.getElementById("review").value.trim();
            if (!review) { alert("Please enter a review!"); return; }

            const btn = document.getElementById("btn");
            const loading = document.getElementById("loading");
            const result = document.getElementById("result");

            btn.disabled = true;
            loading.style.display = "block";
            result.style.display = "none";

            const response = await fetch("/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ review: review })
            });

            const data = await response.json();

            loading.style.display = "none";
            btn.disabled = false;

            result.className = "result " + data.sentiment.toLowerCase();
            document.getElementById("emoji").textContent = data.sentiment === "Positive" ? "😊" : "😞";
            document.getElementById("sentiment").textContent = data.sentiment;
            document.getElementById("confidence").textContent = `Confidence: ${data.confidence}`;
            result.style.display = "block";
        }
    </script>
</body>
</html>
```

---

Now run the app from your terminal:
```
cd sentiment_app
python app.py
```

Then open your browser and go to:
```
http://localhost:5000
